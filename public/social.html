<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurnRate OS — Sosyal Stüdyo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#06041a;
  --s1:rgba(255,255,255,0.025);
  --b1:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.12);
  --text:#f1f0ff;
  --dim:rgba(241,240,255,0.5);
  --faint:rgba(241,240,255,0.22);
  --sidebar:288px;
  --r:13px;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(99,102,241,0.045) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.045) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0
}
.app{display:flex;flex:1;height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden
}
.sb-head{padding:18px 18px 14px;border-bottom:1px solid var(--b1)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#4c1d95);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:800;letter-spacing:-0.02em}
.logo-sub{font-size:10px;color:var(--faint);font-weight:500;margin-top:1px}
.sb-label{padding:14px 18px 6px;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint)}
.tpl-list{flex:1;overflow-y:auto;padding:4px 10px}
.tpl-list::-webkit-scrollbar{width:3px}
.tpl-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:99px}
.tpl-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;
  border-radius:10px;cursor:pointer;border:1px solid transparent;
  transition:background 0.14s,border-color 0.14s;margin-bottom:2px
}
.tpl-item:hover{background:rgba(255,255,255,0.04)}
.tpl-item.active{background:rgba(255,255,255,0.055);border-color:rgba(255,255,255,0.09)}
.tpl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px currentColor}
.tpl-info{flex:1;min-width:0}
.tpl-name{font-size:12.5px;font-weight:600;line-height:1.3}
.tpl-desc{font-size:10px;color:var(--faint);margin-top:1px}
.tpl-arr{font-size:11px;color:var(--faint);opacity:0;transition:opacity 0.14s}
.tpl-item.active .tpl-arr,.tpl-item:hover .tpl-arr{opacity:1}

/* ── SIDEBAR BOTTOM ── */
.sb-bottom{padding:10px 10px 14px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:8px}
.fmt-toggle{display:flex;background:rgba(0,0,0,0.35);border:1px solid var(--b1);border-radius:10px;padding:3px;gap:3px}
.fmt-btn{
  flex:1;padding:7px 4px;border:none;background:transparent;color:var(--dim);
  font-family:'Inter',sans-serif;font-size:10.5px;font-weight:600;border-radius:7px;
  cursor:pointer;transition:all 0.14s;display:flex;flex-direction:column;align-items:center;gap:2px
}
.fmt-btn .fi{font-size:15px;line-height:1}
.fmt-btn:hover{color:var(--text)}
.fmt-btn.active{background:rgba(255,255,255,0.08);color:var(--text)}
.ss-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;
  border:none;border-radius:11px;color:#fff;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;width:100%;
  letter-spacing:-0.01em
}
.ss-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.ss-btn:active{transform:none}
.ss-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:50px;min-height:50px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 26px;gap:10px;flex-shrink:0
}
.tb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background 0.2s,box-shadow 0.2s}
.tb-title{font-size:15px;font-weight:800;letter-spacing:-0.02em}
.tb-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:rgba(255,255,255,0.07);color:var(--dim);letter-spacing:0.04em}
.tb-right{margin-left:auto;font-size:11px;color:var(--faint)}

.preview-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative
}
.preview-area::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 45% at 50% 50%,rgba(99,102,241,0.045),transparent);
  pointer-events:none
}
#preview-box{
  position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 28px 70px rgba(0,0,0,0.65),0 0 50px rgba(99,102,241,0.07);
  border-radius:10px;transform-origin:center center;transition:width 0.28s,height 0.28s
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(10,8,28,0.96);border:1px solid var(--b2);color:var(--text);
  padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999
}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div><div class="logo-name">BurnRate OS</div><div class="logo-sub">Sosyal Stüdyo</div></div>
      </div>
    </div>
    <div class="sb-label">Şablonlar</div>
    <div class="tpl-list" id="tpl-list"></div>
    <div class="sb-bottom">
      <div class="sb-label" style="padding:0 2px 4px;margin:0">Format</div>
      <div class="fmt-toggle">
        <button class="fmt-btn active" id="fmt-1x1" onclick="setFormat('1x1')">
          <span class="fi">⬛</span><span>1:1 Feed</span>
        </button>
        <button class="fmt-btn" id="fmt-9x16" onclick="setFormat('9x16')">
          <span class="fi">📱</span><span>9:16 Story</span>
        </button>
      </div>
      <button class="ss-btn" id="ss-btn" onclick="takeScreenshot()">
        <span id="ss-icon">📸</span><span id="ss-text">Ekran Görüntüsü Al</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="tb-dot" id="tb-dot"></div>
      <div class="tb-title" id="tb-title">AI Danışman</div>
      <span class="tb-badge" id="tb-fmt">1:1 FEED</span>
      <div class="tb-right" id="tb-size">500 × 500 px</div>
    </div>
    <div class="preview-area" id="preview-area">
      <div id="preview-box"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const TEMPLATES=[
  {id:'ai-advisor',  name:'AI Danışman',    desc:'Yapay zeka finansal asistan', color:'#7c3aed', emoji:'🤖'},
  {id:'live-invest', name:'Canlı Yatırım',  desc:'Anlık portföy takibi',        color:'#10b981', emoji:'📈'},
  {id:'subscription',name:'Abonelik',       desc:'Abonelik yönetimi',           color:'#ef4444', emoji:'🔄'},
  {id:'budget',      name:'Bütçe',          desc:'Akıllı bütçe planlayıcı',    color:'#f59e0b', emoji:'💰'},
  {id:'challenge',   name:'Meydan Okuma',   desc:'30 günlük tasarruf yarışı',   color:'#f43f5e', emoji:'🏆'},
  {id:'pdf-report',  name:'PDF Rapor',      desc:'Aylık mali rapor',            color:'#06b6d4', emoji:'📄'},
  {id:'v21-teaser',  name:'v2.1 Teaser',    desc:'Yeni sürüm duyurusu',         color:'#6366f1', emoji:'🚀'},
]
let activeId='ai-advisor', activeFmt='1x1'

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function rgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return `${r},${g},${b}`
}
function ra(hex,a){return`rgba(${rgb(hex)},${a})`}

function gridBg(c,sz=30,op=0.07){
  return`background-image:linear-gradient(${ra(c,op)} 1px,transparent 1px),linear-gradient(90deg,${ra(c,op)} 1px,transparent 1px);background-size:${sz}px ${sz}px`
}
function glow(c,x='50%',y='20%',sz='70%',op=0.2){
  return`<div style="position:absolute;left:${x};top:${y};transform:translate(-50%,-50%);width:${sz};padding-bottom:${sz};border-radius:50%;background:radial-gradient(circle,${ra(c,op)},transparent 70%);pointer-events:none"></div>`
}
function logoBar(c){
  const d=new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric'})
  return`<div style="position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10">
    <div style="display:flex;align-items:center;gap:6px;background:${ra(c,0.22)};border:1px solid ${ra(c,0.45)};padding:4px 10px;border-radius:99px">
      <span style="font-size:11px">🔥</span>
      <span style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.9);letter-spacing:0.07em">BURNRATE OS</span>
    </div>
    <span style="font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.03em">${d}</span>
  </div>`
}
function footer(c){
  return`<div style="position:absolute;bottom:0;left:0;right:0;height:30px;background:${ra(c,0.12)};border-top:1px solid ${ra(c,0.2)};display:flex;align-items:center;justify-content:center">
    <span style="font-size:9px;font-weight:600;color:${ra(c,0.75)};letter-spacing:0.05em">app.burnrate-os.com</span>
  </div>`
}
function wrap(bg,c,inner){
  return`<div style="width:100%;height:100%;background:${bg};position:relative;overflow:hidden;font-family:'Inter',sans-serif;${gridBg(c)}">${inner}</div>`
}

// ─── TEMPLATE 1: AI DANIŞMAN ──────────────────────────────────────────────────
function genAIAdvisor(story){
  const c='#7c3aed',bg='#070416'
  const bubbles=`
    <div style="background:${ra(c,0.18)};border:1px solid ${ra(c,0.32)};border-radius:12px 12px 12px 3px;padding:9px 13px;max-width:88%;margin-bottom:7px">
      <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.88);line-height:1.55">Bu ay harcamalarını ₺2,400 azaltabilirsin 💡</div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px 12px 3px 12px;padding:9px 13px;max-width:80%;align-self:flex-end;margin-bottom:7px">
      <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.65);line-height:1.55">Nereden başlamalıyım?</div>
    </div>
    <div style="background:${ra(c,0.18)};border:1px solid ${ra(c,0.32)};border-radius:12px 12px 12px 3px;padding:9px 13px;max-width:88%">
      <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.88);line-height:1.55">Aboneliklerini optimize ederek <b style="color:#a78bfa">+₺840/ay</b> tasarruf edebilirsin ✅</div>
    </div>`

  if(!story) return wrap(bg,c,`
    ${glow(c,'28%','18%','65%',0.22)}${glow('#a78bfa','78%','82%','45%',0.12)}
    ${logoBar(c)}
    <div style="position:absolute;top:52px;left:18px;right:18px;bottom:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
      <div style="width:60px;height:60px;border-radius:50%;background:${ra(c,0.2)};border:1.5px solid ${ra(c,0.5)};display:flex;align-items:center;justify-content:center;font-size:26px">🤖</div>
      <div style="text-align:center">
        <div style="font-size:25px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-0.03em">AI Finansal<br>Danışmanınız</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:5px">7/24 yanınızda · her zaman akıllı</div>
      </div>
      <div style="width:100%;display:flex;flex-direction:column">${bubbles}</div>
      <div style="display:flex;align-items:center;gap:5px;background:${ra(c,0.15)};border:1px solid ${ra(c,0.3)};padding:5px 13px;border-radius:99px">
        <span style="width:6px;height:6px;border-radius:50%;background:#a78bfa;box-shadow:0 0 6px #a78bfa"></span>
        <span style="font-size:9px;font-weight:700;color:rgba(167,139,250,0.9);letter-spacing:0.05em">AI DANIŞMAN ÖZELLİĞİ</span>
      </div>
    </div>
    ${footer(c)}`)

  return wrap(bg,c,`
    ${glow(c,'50%','15%','85%',0.25)}${glow('#a78bfa','20%','75%','55%',0.12)}
    ${logoBar(c)}
    <div style="position:absolute;top:62px;left:18px;right:18px;bottom:34px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 0">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center">
        <div style="width:72px;height:72px;border-radius:50%;background:${ra(c,0.2)};border:1.5px solid ${ra(c,0.5)};display:flex;align-items:center;justify-content:center;font-size:32px">🤖</div>
        <div style="font-size:28px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-0.03em">AI Finansal<br>Danışmanınız</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4)">7/24 akıllı finansal rehberlik</div>
      </div>
      <div style="width:100%;display:flex;flex-direction:column;gap:7px">
        ${['Harcama analizi & öneriler','Tasarruf fırsatı tespiti','Kişisel hedef belirleme','Anlık finansal uyarılar'].map(f=>`
        <div style="display:flex;align-items:center;gap:9px;background:${ra(c,0.1)};border:1px solid ${ra(c,0.2)};border-radius:9px;padding:10px 13px">
          <span style="font-size:12px;color:#a78bfa;font-weight:700">✓</span>
          <span style="font-size:11.5px;font-weight:500;color:rgba(255,255,255,0.85)">${f}</span>
        </div>`).join('')}
      </div>
      <div style="background:${ra(c,0.85)};padding:12px 28px;border-radius:11px;display:inline-block">
        <span style="font-size:13px;font-weight:800;color:#fff">Hemen Dene →</span>
      </div>
    </div>
    ${footer(c)}`)
}

// ─── TEMPLATE 2: CANLI YATIRIM ────────────────────────────────────────────────
function genLiveInvest(story){
  const c='#10b981',bg='#030f08'
  const assets=[
    {name:'BIST 100',val:'₺48,520',pct:'+2.4%',up:true},
    {name:'USD/TRY', val:'₺32.45', pct:'+0.8%',up:true},
    {name:'Altın',   val:'₺2,840', pct:'-0.3%',up:false},
  ]
  const assetRows=assets.map(a=>`
    <div style="display:flex;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:${story?'10px':'7px'} 12px;margin-bottom:6px">
      <span style="flex:1;font-size:${story?13:11.5}px;font-weight:600;color:rgba(255,255,255,0.8)">${a.name}</span>
      <span style="font-size:${story?14:13}px;font-weight:700;color:#fff;margin-right:10px">${a.val}</span>
      <span style="font-size:10px;font-weight:700;color:${a.up?'#10b981':'#f87171'};background:${a.up?ra(c,0.12):'rgba(248,113,113,0.12)'};padding:2px 8px;border-radius:99px">${a.pct}</span>
    </div>`).join('')
  const svg=`<svg viewBox="0 0 300 60" style="width:100%;height:44px" preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${ra(c,0.28)}"/><stop offset="100%" stop-color="${ra(c,0)}"/></linearGradient></defs>
    <polygon points="0,60 20,55 60,42 100,46 140,28 180,32 220,18 260,22 300,12 300,60" fill="url(#lg)"/>
    <polyline points="20,55 60,42 100,46 140,28 180,32 220,18 260,22 300,12" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="300" cy="12" r="4" fill="${c}"/>
  </svg>`

  if(!story) return wrap(bg,c,`
    ${glow(c,'50%','50%','65%',0.14)}
    ${logoBar(c)}
    <div style="position:absolute;top:52px;left:18px;right:18px;bottom:34px">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;padding:10px 0 10px">
        <div>
          <div style="font-size:10px;font-weight:600;color:${ra(c,0.7)};letter-spacing:0.08em;text-transform:uppercase">Portföy Değeri</div>
          <div style="font-size:40px;font-weight:900;color:#fff;letter-spacing:-0.04em;line-height:1.05">₺148,500</div>
        </div>
        <div style="background:${ra(c,0.14)};border:1px solid ${ra(c,0.3)};padding:4px 11px;border-radius:99px;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:${c}">▲ +18.5% Bu Ay</span>
        </div>
      </div>
      <div style="background:${ra(c,0.05)};border:1px solid ${ra(c,0.12)};border-radius:10px;padding:10px 12px;margin-bottom:10px">${svg}</div>
      ${assetRows}
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:${c};box-shadow:0 0 8px ${c}"></span>
        <span style="font-size:9.5px;font-weight:700;color:${ra(c,0.75)};letter-spacing:0.06em">CANLI VERİ</span>
      </div>
    </div>
    ${footer(c)}`)

  return wrap(bg,c,`
    ${glow(c,'50%','25%','85%',0.18)}
    ${logoBar(c)}
    <div style="position:absolute;top:62px;left:18px;right:18px;bottom:34px;display:flex;flex-direction:column;gap:12px">
      <div style="text-align:center;padding:4px 0">
        <div style="font-size:10px;font-weight:600;color:${ra(c,0.7)};letter-spacing:0.1em;text-transform:uppercase">Portföy Değeri</div>
        <div style="font-size:50px;font-weight:900;color:#fff;letter-spacing:-0.04em;line-height:1.05">₺148,500</div>
        <div style="font-size:14px;font-weight:700;color:${c}">▲ +18.5% Bu Ay</div>
      </div>
      <div style="background:${ra(c,0.05)};border:1px solid ${ra(c,0.12)};border-radius:11px;padding:12px">${svg}</div>
      ${assetRows}
      <div style="background:${ra(c,0.12)};border:1px solid ${ra(c,0.25)};border-radius:11px;padding:14px;text-align:center;margin-top:auto">
        <div style="font-size:14px;font-weight:800;color:#fff">Portföyünü Takip Et</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px">BurnRate OS ile anlık izleme</div>
      </div>
    </div>
    ${footer(c)}`)
}

// ─── TEMPLATE 3: ABONELİK ─────────────────────────────────────────────────────
function genSubscription(story){
  const c='#ef4444',bg='#110204'
  const subs=[
    {n:'Netflix',    logo:'🎬',price:'₺289',tag:''},
    {n:'Spotify',    logo:'🎵',price:'₺139',tag:''},
    {n:'ChatGPT Plus',logo:'🤖',price:'₺649',tag:'Pahalı!'},
    {n:'Notion',     logo:'📝',price:'₺180',tag:''},
  ]
  const rows=subs.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.04);border:1px solid ${i===2?ra(c,0.35):'rgba(255,255,255,0.07)'};border-radius:9px;padding:${story?'10':'8'}px 12px;margin-bottom:6px">
      <span style="font-size:${story?19:17}px">${s.logo}</span>
      <div style="flex:1">
        <div style="font-size:${story?12.5:12}px;font-weight:600;color:#fff">${s.n}</div>

        <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:5px">Haziran 2025 · Ücretsiz Güncelleme</div>
      </div>
      ${featRows}
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px">
        <span style="font-size:10px;font-weight:700;color:${ra(c,0.65)}">🚀 app.burnrate-os.com'u takip et</span>
      </div>
    </div>
    ${footer(c)}`)

  return wrap(bg,c,`
    ${glow(c,'50%','22%','82%',0.25)}${glow('#818cf8','80%','72%','55%',0.12)}
    ${logoBar(c)}
    <div style="position:absolute;top:62px;left:18px;right:18px;bottom:34px;display:flex;flex-direction:column;gap:13px">
      <div style="text-align:center;padding:6px 0">
        <div style="display:inline-flex;align-items:center;gap:5px;background:${ra(c,0.2)};border:1px solid ${ra(c,0.45)};padding:4px 14px;border-radius:99px;margin-bottom:11px">
          <span style="width:5px;height:5px;border-radius:50%;background:${c};box-shadow:0 0 7px ${c}"></span>
          <span style="font-size:9px;font-weight:700;color:rgba(165,180,252,0.95);letter-spacing:0.07em">YAKINDA GELİYOR</span>
        </div>
        <div style="font-size:54px;font-weight:900;color:#fff;letter-spacing:-0.05em;line-height:1.0">v2.1</div>
        <div style="font-size:17px;font-weight:700;color:rgba(165,180,252,0.65);letter-spacing:-0.02em">BurnRate OS</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.28);margin-top:5px">Haziran 2025 · Ücretsiz</div>
      </div>
      ${featRows}
      <div style="background:linear-gradient(135deg,${ra(c,0.8)},rgba(129,140,248,0.6));border-radius:13px;padding:16px;text-align:center;margin-top:auto">
        <div style="font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.02em">🚀 Bildirim Al</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:3px">app.burnrate-os.com</div>
      </div>
    </div>
    ${footer(c)}`)
}

// ─── DISPATCH ─────────────────────────────────────────────────────────────────
const GENS={
  'ai-advisor':genAIAdvisor,'live-invest':genLiveInvest,'subscription':genSubscription,
  'budget':genBudget,'challenge':genChallenge,'pdf-report':genPDFReport,'v21-teaser':genV21Teaser
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  document.getElementById('tpl-list').innerHTML=TEMPLATES.map(t=>`
    <div class="tpl-item${t.id===activeId?' active':''}" onclick="selectTemplate('${t.id}')">
      <span class="tpl-dot" style="background:${t.color};color:${t.color}"></span>
      <div class="tpl-info">
        <div class="tpl-name">${t.emoji} ${t.name}</div>
        <div class="tpl-desc">${t.desc}</div>
      </div>
      <span class="tpl-arr">›</span>
    </div>`).join('')
}

function renderPreview(){
  const story=activeFmt==='9x16'
  const W=story?360:500, H=story?640:500
  const box=document.getElementById('preview-box')
  box.style.width=W+'px'; box.style.height=H+'px'
  const gen=GENS[activeId]
  if(gen) box.innerHTML=gen(story)
  scalePreview()
  const t=TEMPLATES.find(t=>t.id===activeId)
  if(t){
    document.getElementById('tb-title').textContent=t.name
    document.getElementById('tb-dot').style.cssText=`width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${t.color};box-shadow:0 0 10px ${t.color};transition:all 0.2s`
    document.getElementById('tb-fmt').textContent=story?'9:16 STORY':'1:1 FEED'
    document.getElementById('tb-size').textContent=`${W} × ${H} px`
    document.getElementById('ss-btn').style.background=`linear-gradient(135deg,${t.color},${t.color}bb)`
  }
}

function scalePreview(){
  const area=document.getElementById('preview-area')
  const box=document.getElementById('preview-box')
  const story=activeFmt==='9x16'
  const W=story?360:500, H=story?640:500
  const aW=area.clientWidth-64, aH=area.clientHeight-64
  const scale=Math.min(1,aW/W,aH/H)
  box.style.transform=`scale(${scale})`
}

function selectTemplate(id){
  activeId=id; renderSidebar(); renderPreview()
}

function setFormat(fmt){
  activeFmt=fmt
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'))
  document.getElementById('fmt-'+fmt).classList.add('active')
  renderPreview()
}

async function takeScreenshot(){
  const btn=document.getElementById('ss-btn')
  const txt=document.getElementById('ss-text')
  btn.disabled=true; txt.textContent='Yakalanıyor...'
  const box=document.getElementById('preview-box')
  const orig=box.style.transform
  box.style.transform='none'
  try{
    const canvas=await html2canvas(box,{scale:2,useCORS:true,allowTaint:true,backgroundColor:null,logging:false})
    box.style.transform=orig
    const a=document.createElement('a')
    a.download=`burnrate-${activeId}-${activeFmt}-${Date.now()}.png`
    a.href=canvas.toDataURL('image/png')
    a.click()
    showToast('📸 PNG indirildi!')
  }catch(e){
    box.style.transform=orig
    showToast('❌ '+e.message)
  }
  btn.disabled=false; txt.textContent='Ekran Görüntüsü Al'
}

function showToast(msg){
  const t=document.getElementById('toast')
  t.textContent=msg; t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),2500)
}

window.addEventListener('DOMContentLoaded',()=>{
  renderSidebar(); renderPreview()
  window.addEventListener('resize',scalePreview)
})
</script>
</body>
</html>
