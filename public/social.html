<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurnRate OS — Social Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0a1e;--panel:#140d2e;--card:rgba(22,14,46,.8);
  --p:#7c3aed;--ps:#a855f7;--pk:#c084fc;
  --t1:#f0ebff;--t2:#9d89c4;--t3:#4e4270;
  --border:rgba(124,58,237,.2);--success:#10b981;--err:#ef4444;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Syne',sans-serif;overflow:hidden}

.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 10% 15%,rgba(124,58,237,.13) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 90% 85%,rgba(168,85,247,.1) 0%,transparent 60%),
             #0f0a1e}
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(124,58,237,.05) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(124,58,237,.05) 1px,transparent 1px);
  background-size:44px 44px}

.app{position:relative;z-index:1;display:grid;grid-template-rows:52px 1fr;height:100vh}

header{
  display:flex;align-items:center;padding:0 24px;gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(8,4,18,.75);backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;letter-spacing:-.02em}
.logo-mark{
  width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,#6d28d9,#a855f7);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff}
.logo-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.logo-tag{
  font-size:10px;font-weight:700;color:var(--ps);letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border:1px solid rgba(168,85,247,.25);border-radius:20px;
  background:rgba(168,85,247,.08)}

.main{display:grid;grid-template-columns:368px 1fr;overflow:hidden}

/* LEFT */
.left{
  padding:22px 20px;border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:20px;
  background:rgba(12,7,28,.35)}
.left::-webkit-scrollbar{width:3px}
.left::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.slabel{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:9px}

.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.plat-card{
  padding:13px 10px;border:1px solid var(--border);border-radius:12px;
  cursor:pointer;background:rgba(18,11,40,.6);
  transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:7px;
  position:relative;user-select:none}
.plat-card:hover{border-color:rgba(168,85,247,.35);background:rgba(124,58,237,.08)}
.plat-card.active{
  border-color:var(--ps);background:rgba(124,58,237,.14);
  box-shadow:0 0 28px rgba(168,85,247,.12),inset 0 1px 0 rgba(168,85,247,.1)}
.plat-card.active::after{
  content:'';position:absolute;top:8px;right:8px;
  width:5px;height:5px;border-radius:50%;background:var(--ps);box-shadow:0 0 7px var(--ps)}
.plat-icon{width:30px;height:30px;color:var(--t2);transition:color .18s}
.plat-card.active .plat-icon{color:var(--pk)}
.plat-name{font-size:11px;font-weight:700;color:var(--t2);transition:color .18s}
.plat-card.active .plat-name{color:var(--pk)}

.sel-wrap{position:relative}
.sel-wrap select{
  width:100%;padding:10px 34px 10px 13px;
  background:rgba(18,11,40,.8);border:1px solid var(--border);border-radius:10px;
  color:var(--t1);font-family:'Syne',sans-serif;font-size:13px;font-weight:500;
  appearance:none;cursor:pointer;outline:none;transition:border-color .18s}
.sel-wrap select:focus{border-color:var(--ps)}
.sel-wrap::after{
  content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-top:5px solid var(--t2);border-bottom:none;
  margin-top:3px;pointer-events:none}
.sel-wrap select option{background:#1a1035}

.tone-pills{display:flex;flex-wrap:wrap;gap:6px}
.tone-pill{
  padding:5px 12px;border:1px solid var(--border);border-radius:16px;
  font-size:11px;font-weight:700;color:var(--t2);cursor:pointer;
  background:rgba(18,11,40,.6);transition:all .18s}
.tone-pill:hover{border-color:rgba(168,85,247,.35);color:var(--pk)}
.tone-pill.active{border-color:var(--ps);background:rgba(168,85,247,.14);color:var(--pk)}

textarea.extra{
  width:100%;padding:10px 13px;min-height:66px;
  background:rgba(18,11,40,.8);border:1px solid var(--border);border-radius:10px;
  color:var(--t1);font-family:'Syne',sans-serif;font-size:13px;resize:none;
  outline:none;transition:border-color .18s}
textarea.extra:focus{border-color:var(--ps)}
textarea.extra::placeholder{color:var(--t3)}

.gen-btn{
  width:100%;padding:13px;margin-top:auto;
  background:linear-gradient(135deg,#6d28d9,#9333ea);border:none;border-radius:12px;
  color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.05em;position:relative;overflow:hidden;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px}
.gen-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#7c3aed,#a855f7);opacity:0;transition:opacity .2s}
.gen-btn:hover:not(:disabled)::before{opacity:1}
.gen-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 32px rgba(124,58,237,.45)}
.gen-btn:active:not(:disabled){transform:none}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.gen-btn span{position:relative;z-index:1}
.spinner{
  width:15px;height:15px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;
  display:none;position:relative;z-index:1;flex-shrink:0}
.gen-btn.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* RIGHT */
.right{position:relative;display:flex;flex-direction:column;padding:26px 30px;overflow:hidden;gap:0}

.plat-bg-icon{
  position:absolute;right:-20px;bottom:-20px;pointer-events:none;
  opacity:.045;transition:opacity .4s;color:var(--ps)}
.plat-bg-icon svg{width:380px;height:380px}

.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:13px;color:var(--t3);text-align:center}
.empty-box{
  width:52px;height:52px;border:1px solid var(--border);border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(18,11,40,.5);margin-bottom:4px}
.empty h3{font-size:16px;font-weight:700;color:var(--t2)}
.empty p{font-size:13px;max-width:250px;line-height:1.65}

.err-box{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  border-radius:10px;padding:11px 14px;font-size:13px;color:#fca5a5;
  display:none;margin-bottom:14px;flex-shrink:0}
.err-box.show{display:block}

.output{display:none;flex-direction:column;gap:18px;flex:1;min-height:0;overflow-y:auto}
.output::-webkit-scrollbar{width:3px}
.output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.output.show{display:flex;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.out-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.out-badge{
  display:flex;align-items:center;gap:7px;padding:5px 13px 5px 8px;
  background:rgba(124,58,237,.12);border:1px solid rgba(168,85,247,.25);border-radius:20px}
.out-badge svg{width:16px;height:16px;color:var(--ps)}
.out-badge span{font-size:12px;font-weight:700;color:var(--pk)}
.out-actions{display:flex;gap:6px}
.action-btn{
  padding:6px 13px;background:rgba(18,11,40,.8);border:1px solid var(--border);
  border-radius:8px;color:var(--t2);font-family:'Syne',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;gap:5px;letter-spacing:.03em}
.action-btn:hover{border-color:var(--ps);color:var(--pk)}
.action-btn.ok{border-color:var(--success);color:var(--success)}

.content-card{
  background:rgba(18,11,40,.65);border:1px solid var(--border);border-radius:14px;
  padding:22px;position:relative;overflow:hidden;
  max-height:52vh;overflow-y:auto;flex-shrink:0}
.content-card::-webkit-scrollbar{width:3px}
.content-card::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.content-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--ps),transparent)}
.content-text{
  font-family:'Fragment Mono',monospace;font-size:13.5px;line-height:1.8;
  color:var(--t1);white-space:pre-wrap;word-break:break-word}
.char-row{
  display:flex;justify-content:flex-end;margin-top:10px;
  font-size:10px;font-family:'Fragment Mono',monospace;color:var(--t3)}
.char-row.warn{color:#f97316}
.char-row.over{color:var(--err)}

.hash-section{flex-shrink:0}
.hash-pills{display:flex;flex-wrap:wrap;gap:6px}
.hash-pill{
  padding:5px 11px;background:rgba(124,58,237,.1);
  border:1px solid rgba(124,58,237,.22);border-radius:16px;
  font-size:12px;font-weight:600;color:var(--ps);
  font-family:'Fragment Mono',monospace;cursor:pointer;transition:all .18s;
  opacity:0;animation:pop .25s ease forwards}
.hash-pill:hover{background:rgba(124,58,237,.22);border-color:var(--ps);color:var(--pk)}
@keyframes pop{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}

.plat-hint{
  font-size:11px;color:var(--t3);font-family:'Fragment Mono',monospace;
  display:flex;align-items:center;gap:7px;flex-shrink:0}
.plat-hint::before{
  content:'';display:inline-block;width:5px;height:5px;
  border-radius:50%;background:var(--ps);flex-shrink:0}

#visualBox{flex-shrink:0;border-radius:12px;overflow:hidden;animation:fadeUp .4s ease .1s both;display:none}
#visualBox svg{display:block;width:100%}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">B</div>
      BurnRate OS
    </div>
    <div class="logo-sep"></div>
    <div class="logo-tag">Social Generator</div>
  </header>

  <div class="main">
    <!-- LEFT PANEL -->
    <div class="left">

      <div>
        <div class="slabel">Platform</div>
        <div class="plat-grid">
          <div class="plat-card active" data-p="twitter">
            <svg class="plat-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.261 5.634 5.904-5.634zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <div class="plat-name">Twitter / X</div>
          </div>
          <div class="plat-card" data-p="linkedin">

            </svg>
            <div class="plat-name">LinkedIn</div>
          </div>
          <div class="plat-card" data-p="instagram">
            <svg class="plat-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
            <div class="plat-name">Instagram</div>
          </div>
          <div class="plat-card" data-p="threads">
            <svg class="plat-icon" viewBox="0 0 192 192" fill="currentColor">

      </div>

      <div>
        <div class="slabel">Konu</div>
        <div class="sel-wrap">
          <select id="topicSel">
            <option value="v2_1_teaser">v2.1 Teaser — Yakında geliyor</option>
            <option value="feature_ai">AI Finansal Danışman</option>
            <option value="feature_invest">Canlı Yatırım Takibi</option>
            <option value="feature_summary">Aylık Özet & PDF Rapor</option>
            <option value="feature_challenge">30 Gün Finansal Challenge</option>
            <option value="general_product">Genel Ürün Tanıtımı</option>
            <option value="tips">Finansal İpucu</option>
            <option value="engagement">Etkileşim Postu</option>
          </select>
        </div>
      </div>

      <div>
        <div class="slabel">Ton</div>
        <div class="tone-pills">
          <div class="tone-pill active" data-t="heyecanli">Heyecanlı</div>
          <div class="tone-pill" data-t="profesyonel">Profesyonel</div>
          <div class="tone-pill" data-t="gizemli">Gizemli</div>
          <div class="tone-pill" data-t="samimi">Samimi</div>
          <div class="tone-pill" data-t="teknik">Teknik</div>
        </div>
      </div>

      <div>
        <div class="slabel">Ekstra not (opsiyonel)</div>
        <textarea class="extra" id="extraInput" placeholder="Özel detay, kampanya adı, tarih..."></textarea>
      </div>

      <button class="gen-btn" id="genBtn">
        <div class="spinner"></div>
        <span id="btnLabel">Üret</span>
      </button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

      <div class="plat-bg-icon" id="platBg">
        <svg id="platBgSvg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.261 5.634 5.904-5.634zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>

      <div class="empty" id="emptyState">
        <div class="empty-box">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <h3>Hazır</h3>
        <p>Platform, konu ve ton seçip Üret'e bas.</p>
      </div>

      <div class="err-box" id="errBox"></div>

      <div class="output" id="output">
        <div class="out-header">
          <div class="out-badge">
            <svg id="badgeIcon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.261 5.634 5.904-5.634zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>

            <span id="badgeName">Twitter / X</span>

            <button class="action-btn" id="regenBtn">↺ Yeniden</button>
            <button class="action-btn" id="copyBtn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>

              Kopyala

        </div>

          <div class="content-text" id="contentText"></div>
          <div class="char-row" id="charRow"></div>
        </div>

        <div class="hash-section">
          <div class="slabel">Hashtag'ler</div>
          <div class="hash-pills" id="hashPills"></div>
        </div>

        <div class="plat-hint" id="platHint"></div>
        <div id="visualBox"></div>
      </div>

    </div>
  </div>
</div>

<script>

const THREADS_VIEWBOX = '0 0 192 192'

const LABELS = {twitter:'Twitter / X',linkedin:'LinkedIn',instagram:'Instagram',threads:'Threads'}
const LIMITS = {twitter:280,linkedin:3000,instagram:2200,threads:500}
const HINTS = {
  twitter:'Maks. 280 karakter · kısa ve vurucu',
  linkedin:'Profesyonel ağ · 150–350 kelime ideal',
  instagram:'Görsel odaklı · 100–200 kelime + CTA',
  threads:'Maks. 500 karakter · samimi ve sohbet tarzı'
}

let st = {platform:'twitter',topic:'v2_1_teaser',tone:'heyecanli',extra:'',loading:false}
let lastData = null

// Platform cards
document.querySelectorAll('.plat-card').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.plat-card').forEach(x=>x.classList.remove('active'))
    c.classList.add('active')
    st.platform = c.dataset.p
    updateBgIcon(st.platform)
  })
})

// Topic
document.getElementById('topicSel').addEventListener('change',e=>st.topic=e.target.value)

// Tone
document.querySelectorAll('.tone-pill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.tone-pill').forEach(x=>x.classList.remove('active'))
    p.classList.add('active')
    st.tone = p.dataset.t
  })
})

// Extra
document.getElementById('extraInput').addEventListener('input',e=>st.extra=e.target.value)

function updateBgIcon(p){
  const svg = document.getElementById('platBgSvg')
  const vb = p==='threads' ? THREADS_VIEWBOX : '0 0 24 24'
  svg.setAttribute('viewBox', vb)
  svg.innerHTML = `<path d="${SVG_PATHS[p]}"/>`
}

function setBadge(p){
  const icon = document.getElementById('badgeIcon')
  const vb = p==='threads' ? THREADS_VIEWBOX : '0 0 24 24'
  icon.setAttribute('viewBox', vb)
  icon.innerHTML = `<path d="${SVG_PATHS[p]}"/>`
  document.getElementById('badgeName').textContent = LABELS[p]
}

function updateCharRow(text,p){
  const el = document.getElementById('charRow')
  const limit = LIMITS[p], len = text.length
  el.textContent = `${len} / ${limit} karakter`
  el.className = 'char-row'
  if(len > limit) el.classList.add('over')
  else if(len > limit*.85) el.classList.add('warn')
}

async function generate(){
  if(st.loading) return
  st.loading = true
  const btn = document.getElementById('genBtn')
  btn.classList.add('loading'); btn.disabled = true
  document.getElementById('btnLabel').textContent = 'Üretiliyor...'
  document.getElementById('errBox').classList.remove('show')
  document.getElementById('emptyState').style.display = 'none'
  document.getElementById('output').classList.remove('show')

  try{
    const res = await fetch('/api/social',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({platform:st.platform,topic:st.topic,tone:st.tone,extra:st.extra})
    })
    const data = await res.json()
    if(!res.ok) throw new Error(data.error||'Sunucu hatası')
    lastData = data
    showOutput(data)
  }catch(e){
    const eb = document.getElementById('errBox')
    eb.textContent = '⚠ '+e.message
    eb.classList.add('show')
    document.getElementById('emptyState').style.display = 'flex'
  }finally{
    st.loading = false
    btn.classList.remove('loading'); btn.disabled = false
    document.getElementById('btnLabel').textContent = 'Üret'
  }
}

function showOutput(data){
  setBadge(st.platform)

  // Typewriter
  const el = document.getElementById('contentText')
  el.textContent = ''
  const text = data.content || ''
  let i = 0
  const speed = Math.max(8, Math.min(25, 1800/text.length))
  ;(function tick(){
    if(i<text.length){ el.textContent += text[i++]; setTimeout(tick,speed) }
    else updateCharRow(text, st.platform)
  })()

  // Hashtags
  const pills = document.getElementById('hashPills')
  pills.innerHTML = ''
  ;(data.hashtags||[]).forEach((tag,i)=>{
    const pill = document.createElement('div')
    pill.className = 'hash-pill'
    pill.style.animationDelay = i*55+'ms'
    const t = tag.startsWith('#') ? tag : '#'+tag
    pill.textContent = t
    pill.title = 'Kopyala'
    pill.addEventListener('click',()=>{
      navigator.clipboard.writeText(t)
      const orig = pill.textContent
      pill.textContent = '✓'
      setTimeout(()=>pill.textContent=orig, 1000)
    })
    pills.appendChild(pill)
  })

  document.getElementById('platHint').textContent = HINTS[st.platform]
  document.getElementById('output').classList.add('show')

  const visualDiv = document.getElementById('visualBox')
  if(visualDiv){
    visualDiv.innerHTML = buildVisual(data.content, st.topic, st.platform)
    visualDiv.style.display = 'block'
  }
}

function buildVisual(content, topic, platform){
  const visuals = {
    v2_1_teaser:{emoji:'⚡',tag:'V2.1 YAKINDA',ac:'#6366f1',bg1:'rgba(67,56,202,0.4)',bg2:'rgba(99,102,241,0.2)'},
    feature_ai:{emoji:'🤖',tag:'YENİ ÖZELLİK',ac:'#8b5cf6',bg1:'rgba(109,40,217,0.4)',bg2:'rgba(139,92,246,0.2)'},
    feature_invest:{emoji:'📈',tag:'CANLI TAKİP',ac:'#10b981',bg1:'rgba(16,185,129,0.35)',bg2:'rgba(5,150,105,0.2)'},
    feature_summary:{emoji:'📋',tag:'YENİ ÖZELLİK',ac:'#14b8a6',bg1:'rgba(20,184,166,0.35)',bg2:'rgba(15,118,110,0.2)'},
    feature_challenge:{emoji:'🎯',tag:'30 GÜN',ac:'#f43f5e',bg1:'rgba(244,63,94,0.35)',bg2:'rgba(190,18,60,0.2)'},
    general_product:{emoji:'💜',tag:'BURNRATE OS',ac:'#6366f1',bg1:'rgba(67,56,202,0.4)',bg2:'rgba(99,102,241,0.2)'},
    tips:{emoji:'💡',tag:'FİNANSAL İPUCU',ac:'#f59e0b',bg1:'rgba(245,158,11,0.35)',bg2:'rgba(217,119,6,0.2)'},
    engagement:{emoji:'💬',tag:'ETKİLEŞİM',ac:'#06b6d4',bg1:'rgba(6,182,212,0.35)',bg2:'rgba(8,145,178,0.2)'},
  }
  const v = visuals[topic] || visuals.general_product
  const maxLen = 160
  const short = content.length > maxLen ? content.substring(0, maxLen) + '...' : content
  const words = short.split(' ')
  let lines = [], line = ''
  words.forEach(w => { if((line+' '+w).length > 40){lines.push(line.trim());line=w}else line+=' '+w })
  if(line.trim()) lines.push(line.trim())
  lines = lines.slice(0, 5)
  const lsvg = lines.map((l,i) => `<text x="340" y="${210+i*30}" text-anchor="middle" fill="rgba(238,242,255,0.88)" font-family="sans-serif" font-size="14" font-weight="400">${l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</text>`).join('')
  return `<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="rg1" cx="20%" cy="20%"><stop offset="0%" stop-color="${v.bg1}"/><stop offset="100%" stop-color="transparent"/></radialGradient>
<radialGradient id="rg2" cx="80%" cy="80%"><stop offset="0%" stop-color="${v.bg2}"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<rect width="680" height="420" fill="#04040f"/>
<rect width="680" height="420" fill="url(#rg1)"/>
<rect width="680" height="420" fill="url(#rg2)"/>
<line x1="80" y1="1" x2="600" y2="1" stroke="${v.ac}" stroke-opacity="0.4" stroke-width="1"/>
<text x="340" y="60" text-anchor="middle" fill="${v.ac}" fill-opacity="0.55" font-family="monospace" font-size="11" letter-spacing="3">BURNRATE OS</text>
<rect x="264" y="76" width="152" height="24" rx="12" fill="${v.ac}" fill-opacity="0.1"/>
<rect x="264" y="76" width="152" height="24" rx="12" fill="none" stroke="${v.ac}" stroke-opacity="0.3" stroke-width="1"/>
<text x="340" y="93" text-anchor="middle" fill="${v.ac}" font-family="monospace" font-size="9" letter-spacing="2">${v.tag}</text>
<text x="340" y="166" text-anchor="middle" font-size="38">${v.emoji}</text>
${lsvg}
<text x="340" y="400" text-anchor="middle" fill="${v.ac}" fill-opacity="0.3" font-family="monospace" font-size="10" letter-spacing="1">app.burnrate-os.com</text>
<rect x="0.5" y="0.5" width="679" height="419" fill="none" stroke="${v.ac}" stroke-opacity="0.12" stroke-width="1"/>
</svg>`
}

// Copy button
document.getElementById('copyBtn').addEventListener('click',()=>{
  if(!lastData) return
  const tags = (lastData.hashtags||[]).map(t=>t.startsWith('#')?t:'#'+t).join(' ')
  navigator.clipboard.writeText(lastData.content + (tags ? '\n\n'+tags : ''))
  const btn = document.getElementById('copyBtn')
  btn.classList.add('ok')
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Kopyalandı'
  setTimeout(()=>{
    btn.classList.remove('ok')
    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'
  }, 2200)
})

document.getElementById('regenBtn').addEventListener('click', generate)
document.getElementById('genBtn').addEventListener('click', generate)

updateBgIcon('twitter')
</script>
